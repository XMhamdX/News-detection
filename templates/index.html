<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haber Sınıflandırma Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        .category-select {
            margin-top: 20px;
            display: none;
        }
        .prediction-results {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .category-prediction {
            margin-bottom: 15px;
        }
        
        .category-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .category-name {
            font-weight: bold;
        }
        
        .probability-value {
            color: #666;
        }
        
        .progress {
            height: 20px;
            background-color: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar {
            transition: width 0.6s ease;
        }
        
        .prediction-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .prediction-header h4 {
            margin: 0;
            color: #333;
        }
        
        .confidence-level {
            margin: 10px 0 0 0;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Yapay Zeka ile Haber Sınıflandırma</h1>
        
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <form id="newsForm" class="mb-4">
                    <div class="mb-3">
                        <label for="newsText" class="form-label">Haber Metni:</label>
                        <textarea class="form-control" id="newsText" rows="5" required placeholder="Haber metnini buraya girin..."></textarea>
                    </div>
                    <div class="text-center">
                        <button type="button" class="btn btn-primary" onclick="classifyNews()">Haberi Sınıflandır</button>
                        <button type="button" class="btn btn-success" onclick="showAddArticle()">Eğitime Ekle</button>
                        <button type="button" class="btn btn-info" onclick="startTraining()">Modeli Yeniden Eğit</button>
                    </div>
                </form>

                <div id="result" class="result" style="display: none;"></div>

                <div id="categorySelect" class="category-select">
                    <h3>Kategori Seçin:</h3>
                    <select id="category" class="form-select mb-3">
                        <option value="business">İş</option>
                        <option value="entertainment">Eğlence</option>
                        <option value="politics">Siyaset</option>
                        <option value="sport">Spor</option>
                        <option value="tech">Teknoloji</option>
                    </select>
                    <button type="button" class="btn btn-success" onclick="confirmAddArticle()">Eklemeyi Onayla</button>
                </div>

                <div id="trainingProgress" style="display: none;">
                    <h4>Model Eğitimi İlerlemesi</h4>
                    <div class="progress mb-3">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" 
                             role="progressbar" 
                             style="width: 0%" 
                             aria-valuenow="0" 
                             aria-valuemin="0" 
                             aria-valuemax="100">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function classifyNews() {
            const text = document.getElementById('newsText').value;
            if (!text) {
                showResult('Lütfen bir haber metni girin', 'error');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('text', text);
                
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok) {
                    showResult({ prediction: data.prediction, confidence: data.confidence, probabilities: data.probabilities }, 'success');
                } else {
                    showResult(data.error || 'Sınıflandırma sırasında bir hata oluştu', 'error');
                }
            } catch (error) {
                showResult('Sunucu ile bağlantı hatası', 'error');
            }
        }

        function showAddArticle() {
            document.getElementById('categorySelect').style.display = 'block';
        }

        async function confirmAddArticle() {
            const text = document.getElementById('newsText').value;
            const category = document.getElementById('category').value;
            
            if (!text) {
                showResult('Lütfen bir haber metni girin', 'error');
                return;
            }

            try {
                const response = await fetch('/add_article', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text, category })
                });
                
                const data = await response.json();
                if (response.ok) {
                    showResult('Haber başarıyla eklendi', 'success');
                    document.getElementById('categorySelect').style.display = 'none';
                } else {
                    showResult(data.error || 'Haber eklenirken bir hata oluştu', 'error');
                }
            } catch (error) {
                showResult('Sunucu ile bağlantı hatası', 'error');
            }
        }

        let trainingInterval;
        
        function startTraining() {
            fetch('/retrain', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showResult(data.error, 'error');
                    } else {
                        document.getElementById('trainingProgress').style.display = 'block';
                        // İlerlemeyi kontrol etmeye başla
                        trainingInterval = setInterval(checkTrainingProgress, 1000);
                    }
                })
                .catch(error => showResult('Eğitim başlatma hatası: ' + error, 'error'));
        }
        
        function checkTrainingProgress() {
            fetch('/training_progress')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        clearInterval(trainingInterval);
                        showResult(data.error, 'error');
                        return;
                    }
                    
                    const progress = data.progress;
                    const progressBar = document.querySelector('#trainingProgress .progress-bar');
                    progressBar.style.width = progress + '%';
                    progressBar.setAttribute('aria-valuenow', progress);
                    progressBar.textContent = progress.toFixed(1) + '%';
                    
                    if (progress >= 100) {
                        clearInterval(trainingInterval);
                        showResult('Model eğitimi tamamlandı!', 'success');
                    } else if (progress < 0) {
                        clearInterval(trainingInterval);
                        showResult('Model eğitimi sırasında bir hata oluştu.', 'error');
                    }
                })
                .catch(error => {
                    clearInterval(trainingInterval);
                    showResult('İlerleme kontrolü hatası: ' + error, 'error');
                });
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.style.display = 'block';

            if (typeof message === 'string') {
                resultDiv.innerHTML = message;
            } else if (message.probabilities) {
                let html = '<div class="prediction-results">';
                
                // Tahmin ve güven seviyesi
                html += `
                    <div class="prediction-header">
                        <h4>${message.prediction}</h4>
                        <p class="confidence-level">${message.confidence}</p>
                    </div>`;
                
                // Her kategori için olasılık çubuğu
                for (const [category, probability] of Object.entries(message.probabilities)) {
                    const prob = parseFloat(probability.replace('%', ''));
                    html += `
                        <div class="category-prediction">
                            <div class="category-header">
                                <span class="category-name">${category}</span>
                                <span class="probability-value">${probability}</span>
                            </div>
                            <div class="progress">
                                <div class="progress-bar" role="progressbar" 
                                     style="width: ${prob}%; background-color: ${getColorForProbability(prob)}" 
                                     aria-valuenow="${prob}" 
                                     aria-valuemin="0" 
                                     aria-valuemax="100">
                                </div>
                            </div>
                        </div>`;
                }
                html += '</div>';
                resultDiv.innerHTML = html;
            } else {
                resultDiv.innerHTML = JSON.stringify(message);
            }
        }

        function getColorForProbability(prob) {
            // Olasılığa göre renk değişimi
            if (prob >= 70) return '#28a745';  // Yeşil
            if (prob >= 40) return '#ffc107';  // Sarı
            return '#dc3545';                  // Kırmızı
        }
    </script>
</body>
</html>
